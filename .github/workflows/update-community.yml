name: Update Community Videos

permissions:
  contents: write

on:
  schedule:
    # Runs daily at 12:40 UTC — adjust cron if you need a different timezone
    - cron: '30 10 * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    environment: YOUTUBE_API_KEY
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run community updater
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          node .github/scripts/update-community.js

      - name: Commit community.json to community-data branch
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin
          # create or switch to the community-data branch
          git checkout -B community-data
          git add community.json || true
          if git diff --cached --quiet; then
            echo "No changes to community.json"
          else
            git commit -m "chore: update community.json (scheduled)"
            if [ -n "$REPO_PAT" ]; then
              echo "Pushing using provided REPO_PAT secret"
              git push "https://${REPO_PAT}@github.com/${{ github.repository }}" community-data --force
            else
              echo "Pushing using default GITHUB_TOKEN (may be blocked by repo policies)"
              git push -u origin community-data --force
            fi
          fi
