<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Páscoa 🐰 — Poke Utilities</title>
  <!-- Reaproveita os estilos do site para manter o padrão visual sem alterar nada -->
  <link rel="stylesheet" href="styles.css">
  <style>
    /* TODO: tudo abaixo é prefixado com pascoa- para fácil remoção */
    #pascoa-root { max-width:1100px; margin:2.25rem auto; padding:1rem; }
    .pascoa-panel { background: rgba(20,30,40,0.96); border-radius:12px; padding:1.25rem; box-shadow:0 12px 36px rgba(0,0,0,0.5); color:#eef3f8; }
    .pascoa-header { display:flex; align-items:baseline; gap:1rem; }
    .pascoa-header h1 { margin:0; font-size:1.5rem; }
    .pascoa-lead { margin:0; color:#cfd9e6; font-size:0.95rem; }

    .pascoa-continents { display:flex; gap:0.75rem; margin:1rem 0; }
    .pascoa-btn { flex:1; padding:0.9rem 1rem; font-weight:700; border-radius:10px; border:1px solid rgba(255,255,255,0.06); background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); color:#fff; cursor:pointer; }
    .pascoa-btn:focus { outline:3px solid rgba(255,255,255,0.06); }
    .pascoa-btn--active { box-shadow:0 8px 20px rgba(0,0,0,0.45); transform:translateY(-2px); }

    .pascoa-cities { margin:1rem 0; display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:0.6rem; }
    .pascoa-city-btn { padding:0.6rem 0.75rem; border-radius:8px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04); cursor:pointer; text-align:center; font-weight:600; color:#eaeaea; font-size:1rem; text-shadow:0 0 6px rgba(255,255,255,0.06); }

    .pascoa-gallery { margin-top:1rem; }
    .pascoa-gallery-grid { display:grid; gap:0.6rem; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); align-items:start; }
    .pascoa-figure { background:linear-gradient(180deg, rgba(0,0,0,0.1), rgba(0,0,0,0.02)); padding:0.5rem; border-radius:8px; text-align:center; }
    .pascoa-figure img { width:100%; max-width:400px; height:auto; object-fit:contain; border-radius:6px; background:#0a0a0a; display:block; margin:0 auto; }
    .pascoa-missing { margin-top:0.4rem; color:#ffb3b3; font-size:0.95rem; }
    .pascoa-caption { font-size:0.88rem; color:#d1d9e6; margin-top:0.4rem; }
    .pascoa-comment { font-size:0.82rem; color:#a9b3c7; margin-top:0.25rem; }

    .pascoa-controls { display:flex; gap:0.5rem; margin-top:0.75rem; }
    .pascoa-small { padding:0.45rem 0.6rem; font-size:0.86rem; }

    .pascoa-hidden { display:none !important; }

    .pascoa-credits { margin-top:1.25rem; font-size:0.88rem; color:#cbd6e9; border-top:1px dashed rgba(255,255,255,0.03); padding-top:0.85rem; }

    /* Small decor */
    .pascoa-decor { margin-left:0.4rem; opacity:0.95; }

    @media (max-width:640px){
      .pascoa-header { flex-direction:column; align-items:flex-start; gap:0.25rem; }
      .pascoa-figure img { height:160px; }
    }

    /* Image viewer modal (isolated to this page) */
    .pascoa-viewer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); display:none; align-items:center; justify-content:center; z-index:2200; transition:opacity 220ms ease; }
    .pascoa-viewer-overlay[aria-hidden="false"]{ display:flex; opacity:1; }
    .pascoa-viewer-overlay[aria-hidden="true"]{ opacity:0; pointer-events:none; }
    .pascoa-viewer-content{ position:relative; width:100%; max-width:1100px; max-height:92vh; height:92vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .pascoa-viewer-img-wrap{ position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; touch-action:none; }
    .pascoa-viewer-img{ max-width:100%; max-height:100%; will-change:transform; transition:transform 180ms ease; cursor:grab; display:block; }
    .pascoa-viewer-img:active{ cursor:grabbing; }
    .pascoa-viewer-controls{ position:absolute; top:12px; right:12px; display:flex; gap:8px; z-index:5; }
    .pascoa-viewer-btn{ background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.06); color:#fff; padding:8px 10px; border-radius:6px; cursor:pointer; font-size:0.95rem; }
    .pascoa-viewer-nav{ position:absolute; top:50%; transform:translateY(-50%); font-size:1.6rem; color:#fff; background:rgba(0,0,0,0.25); border-radius:50%; width:44px; height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:6; }
    .pascoa-viewer-prev{ left:12px; }
    .pascoa-viewer-next{ right:12px; }
    .pascoa-viewer-caption{ position:absolute; bottom:12px; left:12px; right:12px; color:#eaeaea; font-size:0.95rem; text-align:center; z-index:6; }
    @media (max-width:640px){ .pascoa-viewer-nav{ width:40px; height:40px; font-size:1.2rem; } .pascoa-viewer-controls{ top:8px; right:8px; } }
  </style>
</head>
<body class="dark">
  <main id="pascoa-root" class="pascoa-root" role="region" aria-labelledby="pascoa-title">
    <div class="pascoa-panel">
      <header class="pascoa-header">
        <h1 id="pascoa-title">Páscoa <span class="pascoa-decor">🐰</span></h1>
        <p class="pascoa-lead">Caça aos ovos — escolha um continente e depois uma cidade.</p>
      </header>

      <div class="pascoa-continents" aria-hidden="false">
        <button class="pascoa-btn pascoa-continent-btn" data-continent="kanto">Kanto <span class="pascoa-decor">🐰</span></button>
        <button class="pascoa-btn pascoa-continent-btn" data-continent="johto">Johto <span class="pascoa-decor">🐰</span></button>
      </div>

      <div id="pascoa-cities" class="pascoa-cities" aria-live="polite"></div>

      <section id="pascoa-gallery" class="pascoa-gallery pascoa-hidden" aria-live="polite"></section>

      <div class="pascoa-credits">Agradecimentos aos jogadores que buscaram os ovos e postaram as imagens: Gunko, Must Be Vitão, Bidaoo, Petros, Piol, Texugo, GnR, Rodrigo., Gui, EdzYエドソン, Gimli, Indy Pereira, Daan, Recco e Saulo.</div>
    </div>
  </main>

  <script>
  (function(){
    const root = document.getElementById('pascoa-root');
    if(!root) return;

    // Dados de imagens — caminhos: /pascoa/{continente}/{cidade}/{arquivo}
    const DATA = {
      kanto: {
        label: 'Kanto',
        cities: {
          lavender: { label:'Lavender', images:[{id:'lavender_1',file:'lavender_1.jpg',comment:'Rock Tunnel'},{id:'lavender_2',file:'lavender_2.jpg',comment:'Aqui tem 2 ovos, um no ultimo andar da hunt e outro na entrada da WA'}] },
          pewter: { label:'Pewter', images:[{id:'pewter_1',file:'pewter_1.jpg'}] },
          pallet: { label:'Pallet', images:[{id:'pallet_1',file:'pallet_1.jpg'}] },
          cerulean: { label:'Cerulean', images:[{id:'cerulean_1',file:'cerulean_1.jpg'},{id:'cerulean_2',file:'cerulean_2.jpg',comment:'No dojo de Cerulean, mesmo andar do Mega Greninja'},{id:'cerulean_3',file:'cerulean_3.jpg'},{id:'cerulean_4',file:'cerulean_4.jpg'},{id:'cerulean_5',file:'cerulean_5.jpg',comment:'Blue Island'},{id:'cerulean_9',file:'cerulean_9.jpg',comment:'Hunt de Tauros'},{id:'cerulean_10',file:'cerulean_10.jpg',comment:'Blue Island'}] },
          saffron: { label:'Saffron', images:[{id:'saffron_1',file:'saffron_1.jpg',comment:'Respawn de Eeve'}] },
          vermillion: { label:'Vermillion', images:[{id:'vermillion_1',file:'vermillion_1.jpg'},{id:'vermillion_2',file:'vermillion_2.jpg'},{id:'vermillion_3',file:'vermillion_3.jpg',comment:'Green Island'}] }
        }
      },
      johto: {
        label: 'Johto',
        cities: {
          murcott: { label:'Murcott', images:[{id:'murcott_1',file:'murcott_1.jpg'}] },
          'magma-island': { label:'Magma Island', images:[{id:'magma-island_1',file:'magma-island_1.jpg'}] },
          azalea: { label:'Azalea', images:[{id:'azalea_1',file:'azalea_1.jpg'}] },
          'moro-island': { label:'Moro Island', images:[{id:'moro-island_1',file:'moro-island_1.jpg'}] },
          'kinnow-island': { label:'Kinnow Island', images:[{id:'kinnow-island_1',file:'kinnow-island_1.jpg'}] },
          violet: { label:'Violet', images:[{id:'violet_1',file:'violet_1.jpg'}] },
          'enigma-island': { label:'Enigma Island', images:[{id:'enigma-island_1',file:'enigma-island_1.jpg'}] },
          fairchild: { label:'Fairchild', images:[{id:'fairchild_1',file:'fairchild_1.jpg'}] },
          ecruteak: { label:'Ecruteak', images:[{id:'ecruteak_1',file:'ecruteak_1.jpg'}] },
          cianwood: { label:'Cianwood', images:[{id:'cianwood_1',file:'cianwood_1.jpg'}] },
          butwall: { label:'Butwall', images:[{id:'butwall_1',file:'butwall_1.jpg'}] }
        }
      }
    };

    const continents = Object.keys(DATA);
    const continentButtons = Array.from(root.querySelectorAll('.pascoa-continent-btn'));
    const citiesContainer = root.querySelector('#pascoa-cities');
    const galleryEl = root.querySelector('#pascoa-gallery');

    function clearChildren(el){ while(el && el.firstChild) el.removeChild(el.firstChild); }

    function slugToPath(continent, city, file){ return `/pascoa/${continent}/${city}/${file}`; }

    function buildImageCandidates(continent, city, file){
      const candidates = [];
      const base = String(file || '').replace(/^\/+|^\.\//g, '');
      const exts = ['.png','.jpg','.jpeg','.webp'];
      const hasExt = /\.[a-zA-Z0-9]+$/.test(base);
      if(hasExt){
        candidates.push(`/pascoa/${continent}/${city}/${base}`);
        const lower = base.toLowerCase();
        if(lower !== base) candidates.push(`/pascoa/${continent}/${city}/${lower}`);
        const nameNoExt = base.replace(/\.[^/.]+$/, '');
        exts.forEach(ext => {
          const m = nameNoExt + ext;
          if(m !== base && m !== lower) candidates.push(`/pascoa/${continent}/${city}/${m}`);
        });
      } else {
        exts.forEach(ext => candidates.push(`/pascoa/${continent}/${city}/${base}${ext}`));
      }
      return [...new Set(candidates)];
    }

    function setImgWithFallback(img, continent, cityKey, file){
      const srcs = buildImageCandidates(continent, cityKey, file);
      let i = 0;
      img.onerror = function(){
        i++;
        if(i >= srcs.length){
          this.style.opacity = 0.4;
          this.alt = 'Imagem não encontrada';
          const fig = this.closest('.pascoa-figure');
          if(fig && !fig.querySelector('.pascoa-missing')){
            const miss = document.createElement('div');
            miss.className = 'pascoa-missing';
            miss.textContent = 'Imagem não encontrada';
            fig.appendChild(miss);
          }
          return;
        }
        this.src = srcs[i];
      };
      img.src = srcs[0];
    }

    // Detect all images for a city by probing sequential filenames: prefix_1, prefix_2, ...
    async function detectCityImages(continent, cityKey, existingImgs){
      const result = [];
      const seenBases = new Set();
      const existingMap = new Map();
      const existingBaseMap = new Map();
      (existingImgs || []).forEach(o => {
        existingMap.set(o.file, o.comment || '');
        const base = String(o.file || '').replace(/\.[^/.]+$/, '');
        if(!existingBaseMap.has(base)) existingBaseMap.set(base, o.comment || '');
      });

      // determine prefix and preferred extension order
      let prefix = cityKey;
      let extOrder = ['.jpg', '.png', '.webp', '.jpeg'];
      if(existingImgs && existingImgs.length){
        const sample = existingImgs[0].file || '';
        const m = sample.match(/^(.+?)_\d+(\.[^.]+)?$/);
        if(m) prefix = m[1];
        const extMatch = sample.match(/(\.[a-zA-Z0-9]+)$/);
        if(extMatch){
          const ext = extMatch[1].toLowerCase();
          extOrder = [ext, ...extOrder.filter(e=>e!==ext)];
        }
      }

      const maxIterations = 200; // safety cap
      for(let i=1;i<=maxIterations;i++){
        let foundFile = null;
        for(const ext of extOrder){
          const candidate = `/pascoa/${continent}/${cityKey}/${prefix}_${i}${ext}`;
          try{
            const res = await fetch(candidate, { method: 'HEAD' });
            if(res && res.ok){ foundFile = `${prefix}_${i}${ext}`; break; }
          }catch(e){ /* ignore network errors */ }
          // try lowercase prefix variant
          const candidateLower = `/pascoa/${continent}/${cityKey}/${prefix.toLowerCase()}_${i}${ext}`;
          if(candidateLower !== candidate){
            try{ const res2 = await fetch(candidateLower, { method: 'HEAD' }); if(res2 && res2.ok){ foundFile = `${prefix.toLowerCase()}_${i}${ext}`; break; } }catch{}
          }
        }
        if(foundFile){
          const baseName = foundFile.replace(/\.[^/.]+$/, '') ;
          if(!seenBases.has(baseName)){
            const comment = existingBaseMap.get(baseName) || existingMap.get(foundFile) || '';
            result.push({ file: foundFile, comment });
            seenBases.add(baseName);
          }
        } else {
          break; // stop on first missing as requested
        }
      }

      // include any explicitly listed files that didn't match numeric pattern
      (existingImgs || []).forEach(o=>{
        const base = String(o.file || '').replace(/\.[^/.]+$/, '');
        if(!seenBases.has(base)){
          result.push({ file: o.file, comment: o.comment || '' });
          seenBases.add(base);
        }
      });

      return result;
    }

    function renderCities(continent){
      clearChildren(citiesContainer);
      galleryEl.classList.add('pascoa-hidden');
      const cont = DATA[continent];
      if(!cont) return;
      // highlight continent button
      continentButtons.forEach(b=> b.classList.toggle('pascoa-btn--active', b.dataset.continent===continent));

      const keys = Object.keys(cont.cities || {});
      keys.forEach(key => {
        const city = cont.cities[key];
        const btn = document.createElement('button');
        btn.type='button';
        btn.className='pascoa-city-btn pascoa-btn--small';
        btn.textContent = city.label + ' 🐰';
        btn.dataset.city = key;
        btn.addEventListener('click', (ev)=>{
          ev.stopPropagation();
          renderGallery(continent, key);
        });
        citiesContainer.appendChild(btn);
      });
    }

    async function renderGallery(continent, cityKey){
      const city = DATA[continent] && DATA[continent].cities[cityKey];
      if(!city) return;
      clearChildren(galleryEl);
      galleryEl.classList.remove('pascoa-hidden');
      const title = document.createElement('h2');
      title.textContent = `${city.label} — ${DATA[continent].label} 🐰`;
      title.style.marginTop = '0';
      galleryEl.appendChild(title);

      const controls = document.createElement('div');
      controls.className='pascoa-controls';
      const backBtn = document.createElement('button'); backBtn.type='button'; backBtn.className='pascoa-btn pascoa-small'; backBtn.textContent='← Voltar às cidades';
      backBtn.addEventListener('click', ()=>{ renderCities(continent); galleryEl.classList.add('pascoa-hidden'); });
      controls.appendChild(backBtn);
      galleryEl.appendChild(controls);

      const grid = document.createElement('div'); grid.className='pascoa-gallery-grid';

      // detect images automatically (sequential pattern). merge with any existing DATA entries
      const foundImages = await detectCityImages(continent, cityKey, city.images || []);
      console.info(`Carregadas ${foundImages.length} imagens em /pascoa/${continent}/${cityKey}`);

      foundImages.forEach((imgObj, idx) => {
        const fig = document.createElement('figure'); fig.className='pascoa-figure';
        const img = document.createElement('img');
        img.alt = imgObj.comment || (city.label + ' — imagem');
        img.loading = 'lazy';
        setImgWithFallback(img, continent, cityKey, imgObj.file);
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', (ev)=>{ ev.stopPropagation(); openImageViewer(continent, cityKey, idx, foundImages); });
        fig.appendChild(img);
        if(imgObj.comment){
          const c = document.createElement('div'); c.className='pascoa-comment'; c.textContent = imgObj.comment; fig.appendChild(c);
        }
        grid.appendChild(fig);
      });

      galleryEl.appendChild(grid);
      // scroll into view
      galleryEl.scrollIntoView({behavior:'smooth', block:'start'});
    }

    // attach continent handlers
    /* Image viewer / zoom/navigation state and helpers */
    let _viewer = null;
    const viewerState = { scale:1, x:0, y:0, isDragging:false, isPinching:false, pointers:new Map(), initialPinchDistance:0, initialPinchScale:1, startTouch:null, currentIndex:0, images:[], continent:'', cityKey:'', keyHandler:null };

    function ensureImageViewer(){
      if(_viewer) return _viewer;
      const overlay = document.createElement('div'); overlay.className = 'pascoa-viewer-overlay'; overlay.id = 'pascoa-viewer'; overlay.setAttribute('aria-hidden','true'); overlay.setAttribute('role','dialog');

      const content = document.createElement('div'); content.className = 'pascoa-viewer-content';

      const controls = document.createElement('div'); controls.className = 'pascoa-viewer-controls';
      const zoomOut = document.createElement('button'); zoomOut.className='pascoa-viewer-btn'; zoomOut.type='button'; zoomOut.textContent='−';
      const zoomIn = document.createElement('button'); zoomIn.className='pascoa-viewer-btn'; zoomIn.type='button'; zoomIn.textContent='+';
      const closeBtn = document.createElement('button'); closeBtn.className='pascoa-viewer-btn'; closeBtn.type='button'; closeBtn.textContent='✖';
      controls.appendChild(zoomOut); controls.appendChild(zoomIn); controls.appendChild(closeBtn);
      content.appendChild(controls);

      const wrap = document.createElement('div'); wrap.className='pascoa-viewer-img-wrap';
      const img = document.createElement('img'); img.className='pascoa-viewer-img'; img.draggable = false; img.alt = '';
      wrap.appendChild(img);
      content.appendChild(wrap);

      const prevBtn = document.createElement('button'); prevBtn.className='pascoa-viewer-nav pascoa-viewer-prev'; prevBtn.type='button'; prevBtn.innerHTML = '‹';
      const nextBtn = document.createElement('button'); nextBtn.className='pascoa-viewer-nav pascoa-viewer-next'; nextBtn.type='button'; nextBtn.innerHTML = '›';
      const caption = document.createElement('div'); caption.className='pascoa-viewer-caption';
      content.appendChild(prevBtn); content.appendChild(nextBtn); content.appendChild(caption);

      overlay.appendChild(content);
      document.body.appendChild(overlay);

      // internal helpers
      function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
      function applyTransform(){ img.style.transform = `translate(${viewerState.x}px, ${viewerState.y}px) scale(${viewerState.scale})`; }

      function zoomBy(factor, centerX, centerY){
        const prev = viewerState.scale;
        let next = clamp(prev * factor, 1, 4);
        if(next === prev) return;
        viewerState.scale = next;
        // when zooming out to 1, reset pan
        if(viewerState.scale <= 1.001){ viewerState.x = 0; viewerState.y = 0; }
        applyTransform();
      }

      function updateViewerImage(){
        const idx = viewerState.currentIndex || 0;
        const obj = (viewerState.images && viewerState.images[idx]) || null;
        if(!obj){ img.src = 'about:blank'; caption.textContent = ''; return; }
        caption.textContent = obj.comment || '';
        img.style.opacity = 1; img.style.transition = 'none';
        viewerState.scale = 1; viewerState.x = 0; viewerState.y = 0; applyTransform();
        setImgWithFallback(img, viewerState.continent, viewerState.cityKey, obj.file);
      }

      function showViewer(){ overlay.setAttribute('aria-hidden','false'); document.documentElement.style.overflow = 'hidden'; viewerState.keyHandler = function(e){ if(e.key === 'Escape') closeViewer(); if(e.key === 'ArrowLeft') prevImage(); if(e.key === 'ArrowRight') nextImage(); }; document.addEventListener('keydown', viewerState.keyHandler); }
      function closeViewer(){ overlay.setAttribute('aria-hidden','true'); document.documentElement.style.overflow = ''; try{ img.src = 'about:blank'; }catch{} if(viewerState.keyHandler) document.removeEventListener('keydown', viewerState.keyHandler); viewerState.pointers.clear(); viewerState.isDragging = false; viewerState.isPinching = false; }

      function prevImage(){ if(!viewerState.images || viewerState.images.length===0) return; viewerState.currentIndex = (viewerState.currentIndex - 1 + viewerState.images.length) % viewerState.images.length; updateViewerImage(); }
      function nextImage(){ if(!viewerState.images || viewerState.images.length===0) return; viewerState.currentIndex = (viewerState.currentIndex + 1) % viewerState.images.length; updateViewerImage(); }

      // pointer handling: pan and pinch
      let pointerStart = null;
      wrap.addEventListener('pointerdown', (ev)=>{
        ev.preventDefault(); wrap.setPointerCapture(ev.pointerId); viewerState.pointers.set(ev.pointerId, {x:ev.clientX, y:ev.clientY});
        if(viewerState.pointers.size === 2){
          // start pinch
          const pts = Array.from(viewerState.pointers.values());
          const dx = pts[0].x - pts[1].x; const dy = pts[0].y - pts[1].y; viewerState.initialPinchDistance = Math.hypot(dx, dy); viewerState.initialPinchScale = viewerState.scale; viewerState.isPinching = true;
        } else {
          viewerState.isDragging = true; pointerStart = {x: ev.clientX, y: ev.clientY, t: Date.now(), sx: viewerState.x, sy: viewerState.y};
        }
      });
      wrap.addEventListener('pointermove', (ev)=>{
        if(viewerState.isPinching && viewerState.pointers.size >= 2){
          // update pointers map
          if(viewerState.pointers.has(ev.pointerId)) viewerState.pointers.set(ev.pointerId, {x:ev.clientX, y:ev.clientY});
          const pts = Array.from(viewerState.pointers.values());
          if(pts.length < 2) return;
          const dx = pts[0].x - pts[1].x; const dy = pts[0].y - pts[1].y; const dist = Math.hypot(dx, dy);
          if(viewerState.initialPinchDistance > 0){ const ratio = dist / viewerState.initialPinchDistance; viewerState.scale = clamp(viewerState.initialPinchScale * ratio, 1, 4); applyTransform(); }
          return;
        }
        if(viewerState.isDragging && viewerState.pointers.size === 1){
          // pan
          const dx = ev.clientX - pointerStart.x; const dy = ev.clientY - pointerStart.y; viewerState.x = pointerStart.sx + dx; viewerState.y = pointerStart.sy + dy; applyTransform(); return;
        }
      });
      wrap.addEventListener('pointerup', (ev)=>{
        try{ wrap.releasePointerCapture(ev.pointerId); }catch{}
        viewerState.pointers.delete(ev.pointerId);
        const now = Date.now();
        if(pointerStart && !viewerState.isPinching){
          const dx = ev.clientX - pointerStart.x; const dy = ev.clientY - pointerStart.y; const dt = now - pointerStart.t;
          // swipe to navigate when not zoomed
          if(Math.abs(dx) > 60 && Math.abs(dy) < 80 && viewerState.scale <= 1.05 && dt < 600){ if(dx < 0) nextImage(); else prevImage(); }
        }
        viewerState.isDragging = false; viewerState.isPinching = false; pointerStart = null; viewerState.initialPinchDistance = 0; viewerState.initialPinchScale = 1;
      });
      wrap.addEventListener('pointercancel', ()=>{ viewerState.pointers.clear(); viewerState.isDragging = false; viewerState.isPinching = false; pointerStart = null; });

      // wheel to zoom
      wrap.addEventListener('wheel', (ev)=>{ ev.preventDefault(); if(ev.deltaY < 0) zoomBy(1.12); else zoomBy(1/1.12); }, {passive:false});

      // nav buttons
      prevBtn.addEventListener('click', (e)=>{ e.stopPropagation(); prevImage(); });
      nextBtn.addEventListener('click', (e)=>{ e.stopPropagation(); nextImage(); });
      zoomIn.addEventListener('click', (e)=>{ e.stopPropagation(); zoomBy(1.25); });
      zoomOut.addEventListener('click', (e)=>{ e.stopPropagation(); zoomBy(1/1.25); });
      closeBtn.addEventListener('click', (e)=>{ e.stopPropagation(); closeViewer(); });

      overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeViewer(); });

      // expose some actions
      _viewer = { overlay, img, caption, show(showState){ viewerState.continent = showState.continent; viewerState.cityKey = showState.cityKey; viewerState.images = showState.images || []; viewerState.currentIndex = showState.index || 0; updateViewerImage(); showViewer(); }, close: closeViewer, prev: prevImage, next: nextImage };
      return _viewer;
    }

    function openImageViewer(continent, cityKey, index, images){
      const v = ensureImageViewer(); v.show({ continent, cityKey, images, index });
    }

    /* attach continent handlers */
    continentButtons.forEach(btn => btn.addEventListener('click', ()=>{
      const key = btn.dataset.continent;
      renderCities(key);
    }));

    // initial state: show nothing until user clicks a continent (keeps it lightweight)
  })();
  </script>
</body>
</html>
