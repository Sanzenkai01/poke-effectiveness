<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Redirecionando para a Home do Poke Utilities.">
    <title>Poke Utilities</title>
    <link rel="icon" type="image/x-icon" href="icons-type/favicon.ico">
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(160deg, #07111d 0%, #0b1524 48%, #101826 100%);
            color: #eef5ff;
            font-family: Arial, sans-serif;
        }
        .redirect-shell {
            padding: 1.2rem 1.4rem;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            background: rgba(10, 18, 31, 0.78);
            box-shadow: 0 18px 44px rgba(0,0,0,0.28);
            text-align: center;
        }
        a { color: #9fe5ff; }
    </style>
    <script>
        (function(){
            var params = new URLSearchParams(window.location.search);
            var appKeys = ['tab', 'types', 'topic', 'bossmode', 'boss', 'mode', 'plan', 'quick'];
            var shouldOpenApp = appKeys.some(function(key){ return params.has(key); }) || Boolean(window.location.hash);
            var target = shouldOpenApp ? ('./app.html' + window.location.search + window.location.hash) : './home/';
            window.location.replace(target);
        })();
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0; url=./home/">
    </noscript>
</head>
<body>
    <div class="redirect-shell">
        <p>Redirecionando...</p>
        <p><a href="./home/">Abrir Home</a></p>
    </div>
</body>
</html>
