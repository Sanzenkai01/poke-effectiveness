<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efetividade de Tipos Pokémon</title>
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
      <h1>Efetividade de Tipos Pokémon</h1>
      <button id="theme-toggle" aria-label="Toggle dark/light mode">🌓</button>
    </header>
    <p>Clique em um tipo para ver contra quais ele é efetivo.</p>

    <div class="card">
      <div class="search-wrapper">
        <input type="text" id="type-search" placeholder="Buscar tipo..." />
      </div>
      <div id="chart-container" class="chart-container">
        <svg id="connections"></svg>
        <div id="chart" class="grid"></div>
      </div>
      <div id="info" class="info"></div>
    </div>

    <!-- hidden image sprite fallback -->
    <!-- icons generated via script in /icons directory -->

    <script src="script.js"></script>
</body>
</html>
