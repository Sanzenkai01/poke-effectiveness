<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoopa Portais</title>
  <link rel="icon" type="image/x-icon" href="../icons-type/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="header">
    <button id="back-btn" class="icon-button" onclick="location.href='../index.html'" aria-label="Voltar ao site">↩️</button>
    <h1>Hoopa Portais</h1>
    <div style="width:48px;" aria-hidden="true"></div>
  </header>

  <p class="intro" style="max-width:800px;margin:0 auto 1rem;color:#ddd;">Clique em um Boss para ver recomendações de pokémons para enfrentá-lo.</p>

  <div id="speedster-grid" class="speedster-grid" role="list" aria-label="Lista de Speedsters"></div>

  <div id="speedster-modal" class="speedster-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Detalhes do Speedster">
    <div class="speedster-modal-backdrop" data-close="true"></div>
    <div class="speedster-modal-content" role="document">
      <button class="speedster-modal-close" aria-label="Fechar">✖</button>
      <div class="speedster-modal-header">
        <img id="modal-clan" class="speedster-clan-icon" alt="Ícone do clã" aria-hidden="true" />
        <div>
          <h2 id="modal-title"></h2>
          <p id="modal-subtitle" class="speedster-subtitle"></p>
        </div>
      </div>
      <div id="modal-body" class="speedster-modal-body"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js" integrity="sha512-tdbXbHLXZBBNJ0u2vhuGKxAyYfO/FTISM+zYo/vWABzZT/K+VjmQjA66tqBy6RchQXi+bXV2qa1J4CxSYx18Rg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="hoopa-portais.js"></script>
</body>
</html>
